services:
  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      # Live-reload notebooks and data from host — edits persist outside the container
      - ./notebooks:/app/notebooks
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app

  dashboard:
    build: .
    command: streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
    profiles:
      - dashboard

  test:
    build: .
    command: python -m pytest --tb=short -q
    environment:
      - PYTHONPATH=/app
    profiles:
      - test
